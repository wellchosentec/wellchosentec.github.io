<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躍成科技 - 車輛管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen py-6 px-4 font-sans text-slate-800">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        
        <div class="bg-gradient-to-r from-slate-800 to-blue-900 text-white p-6 text-center shadow-md">
            <h1 class="text-2xl md:text-3xl font-bold tracking-wider mb-2">躍成科技股份有限公司</h1>
            <p class="text-sm md:text-base text-slate-300 font-medium">車輛使用申請 ＼ 汽車工作排程智慧管理系統</p>
        </div>

        <div class="flex border-b border-slate-200 bg-slate-50">
            <button id="tab-apply" class="flex-1 py-3 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition">
                <i class="fa-solid fa-car-tunnel mr-1"></i> 新單申請 (出車前)
            </button>
            <button id="tab-query" class="flex-1 py-3 text-center font-bold text-sm text-slate-500 hover:bg-slate-100 transition">
                <i class="fa-solid fa-magnifying-glass mr-1"></i> 查詢 / 回廠補填里程
            </button>
        </div>

        <form id="carForm" class="p-6 space-y-6">
            <input type="hidden" id="formMode" value="CREATE"> 
            <input type="hidden" id="rowId" value=""> 

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="text-md font-semibold text-blue-950 mb-3 flex items-center gap-2 border-b border-slate-200 pb-1.5">
                    <i class="fa-solid fa-file-invoice"></i> 派車基本資訊
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">日期</label>
                        <input type="date" id="date" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">車號 (可選可自填)</label>
                        <input type="text" id="carNumber" list="carList" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white" placeholder="請輸入或選擇車號">
                        <datalist id="carList">
                            <option value="BLB-1251"></option>
                            <option value="公務車A-1234"></option>
                            <option value="貨車B-5678"></option>
                        </datalist>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">申請人 / 填表人 (可選可自填)</label>
                        <input type="text" id="applicant" list="userList" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white" placeholder="如：黃季豐">
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">出車時間</label>
                        <input type="time" id="startTime" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">收車時間 <span class="text-amber-600 text-[10px]">(回廠再填)</span></label>
                        <input type="time" id="endTime" class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-slate-50">
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-xs font-bold text-slate-600 mb-1">同行人員 / 隨車人員 (可選可自填)</label>
                    <input type="text" id="passengers" list="userList" class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white" value="無">
                    <datalist id="userList">
                        <option value="黃季豐"></option>
                        <option value="張三"></option>
                        <option value="李四"></option>
                        <option value="無"></option>
                    </datalist>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="text-md font-semibold text-blue-950 mb-3 flex items-center gap-2 border-b border-slate-200 pb-1.5">
                    <i class="fa-solid fa-shield-halved"></i> 出車前車輛檢查
                </h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3 py-2">
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="carCheck" value="機油" checked>機油</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="carCheck" value="水箱" checked>水箱</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="carCheck" value="輪胎" checked>輪胎</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="carCheck" value="燈光" checked>燈光</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="carCheck" value="刹車" checked>刹車</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="carCheck" value="車內整潔" checked>車內整潔</label>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">車況待修事項</label>
                        <input type="text" id="maintenanceNeed" class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white" value="無">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">預計行程 (總體概述)</label>
                        <input type="text" id="estimatedRoute" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white" placeholder="例如：南電樹林">
                    </div>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex justify-between items-center mb-3 border-b border-slate-200 pb-1.5">
                    <h2 class="text-md font-semibold text-blue-950 flex items-center gap-2">
                        <i class="fa-solid fa-route"></i> 行駛路線與排程明細 <span class="text-amber-600 text-[10px]">(回廠可修改新增)</span>
                    </h2>
                    <button type="button" id="addRouteBtn" class="bg-blue-600 text-white text-xs font-bold py-1 px-2.5 rounded-lg"><i class="fa-solid fa-plus"></i> 新增下一段</button>
                </div>
                <div id="routesContainer" class="space-y-4">
                    <div class="route-item bg-white p-3 rounded-lg border border-slate-200 grid grid-cols-1 md:grid-cols-4 gap-3 relative pt-6 md:pt-3">
                        <div class="absolute top-2 left-2 bg-slate-200 text-slate-700 font-bold text-xs w-5 h-5 rounded-full flex items-center justify-center index-tag">1</div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500">行駛路線</label>
                            <input type="text" name="routePath[]" required class="w-full border-b border-slate-300 p-1 text-sm outline-none" placeholder="如: 公司→南電樹林">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500">行駛里程 (起→迄) <span class="text-amber-600">(可後補)</span></label>
                            <input type="text" name="routeMileage[]" class="w-full border-b border-slate-300 p-1 text-sm outline-none" placeholder="如: 221121→221127">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500">用途</label>
                            <select name="routePurpose[]" class="w-full border-b border-slate-300 p-1 text-sm outline-none bg-transparent">
                                <option value="送貨">📦 送貨</option>
                                <option value="取貨">📥 取貨</option>
                                <option value="售服">🛠️ 售服</option>
                                <option value="業訪">💼 業訪</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500">備註</label>
                            <input type="text" name="routeNotes[]" class="w-full border-b border-slate-300 p-1 text-sm outline-none">
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-md transition">
                <i class="fa-solid fa-paper-plane"></i> 提交資料 (發送通知)
            </button>
        </form>

        <div id="querySection" class="p-6 hidden space-y-4">
            <div class="flex gap-2">
                <input type="date" id="searchDate" class="rounded-lg border border-slate-300 p-2 text-sm flex-1">
                <button id="btnSearch" class="bg-blue-600 text-white px-4 rounded-lg text-sm font-bold"><i class="fa-solid fa-magnifying-glass"></i> 查詢當日車單</button>
            </div>
            
            <div id="searchResult" class="space-y-3 mt-4">
                <p class="text-center text-sm text-slate-400">請選擇日期並點擊查詢</p>
            </div>
        </div>

        <div id="statusBox" class="hidden m-6 p-4 rounded-xl text-center font-bold text-sm"></div>
    </div>

    <script>
        // 設定今日日期
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        document.getElementById('searchDate').value = new Date().toISOString().split('T')[0];

        const BACKEND_API_URL = "https://script.google.com/macros/s/您的GAS部署ID/exec";

        // 分頁切換邏輯
        const tabApply = document.getElementById('tab-apply');
        const tabQuery = document.getElementById('tab-query');
        const carForm = document.getElementById('carForm');
        const querySection = document.getElementById('querySection');

        tabApply.addEventListener('click', () => {
            setTab('apply');
            document.getElementById('formMode').value = "CREATE";
            carForm.reset();
            document.getElementById('submitBtn').innerText = "提交新單申請 (出車通報)";
        });
        tabQuery.addEventListener('click', () => setTab('query'));

        function setTab(mode) {
            if(mode === 'apply') {
                tabApply.className = "flex-1 py-3 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition";
                tabQuery.className = "flex-1 py-3 text-center font-bold text-sm text-slate-500 hover:bg-slate-100 transition";
                carForm.classList.remove('hidden');
                querySection.classList.add('hidden');
            } else {
                tabQuery.className = "flex-1 py-3 text-center font-bold text-sm border-b-2 border-blue-600 text-blue-600 transition";
                tabApply.className = "flex-1 py-3 text-center font-bold text-sm text-slate-500 hover:bg-slate-100 transition";
                carForm.classList.add('hidden');
                querySection.classList.remove('hidden');
            }
        }

        // 動態增刪行程邏輯 (同前次代碼，此處略過以保持簡潔...)

        // 模擬查詢資料 (未來串接 GAS 從試算表撈資料)
        document.getElementById('btnSearch').addEventListener('click', async () => {
            const resultDiv = document.getElementById('searchResult');
            resultDiv.innerHTML = `<div class="text-center text-sm text-slate-500"><i class="fa-solid fa-spinner animate-spin"></i> 正在自雲端試算表撈取資料...</div>`;
            
            try {
                const res = await fetch(`${BACKEND_API_URL}?action=read&date=${document.getElementById('searchDate').value}`);
                const data = await res.json();
                
                if(data.length === 0) {
                    resultDiv.innerHTML = `<p class="text-center text-sm text-red-500">該日無派車紀錄</p>`;
                    return;
                }

                resultDiv.innerHTML = "";
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-50 p-4 rounded-xl border border-slate-200 flex justify-between items-center shadow-xs";
                    card.innerHTML = `
                        <div>
                            <div class="font-bold text-slate-800">${item.carNumber} ─ ${item.applicant}</div>
                            <div class="text-xs text-slate-500">行程: ${item.estimatedRoute} | 時間: ${item.timeWindow}</div>
                        </div>
                        <button onclick="loadFormForEdit(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold py-1.5 px-3 rounded-lg">
                            <i class="fa-solid fa-pen-to-square"></i> 修改/補填
                        </button>
                    `;
                    resultDiv.appendChild(card);
                });
            } catch (e) {
                resultDiv.innerHTML = `<p class="text-center text-sm text-red-500">無法連線至試算表資料庫</p>`;
            }
        });

        // 把舊資料填回表單進行修改
        window.loadFormForEdit = function(item) {
            setTab('apply');
            document.getElementById('formMode').value = "UPDATE";
            document.getElementById('rowId').value = item.rowId; // 試算表的第幾列
            document.getElementById('date').value = item.date;
            document.getElementById('carNumber').value = item.carNumber;
            document.getElementById('applicant').value = item.applicant;
            document.getElementById('passengers').value = item.passengers;
            document.getElementById('estimatedRoute').value = item.estimatedRoute;
            document.getElementById('maintenanceNeed').value = item.maintenanceNeed;
            
            // 拆解時間
            const times = item.timeWindow.split(' ~ ');
            document.getElementById('startTime').value = times[0] || "";
            document.getElementById('endTime').value = times[1] || "";

            // 動態還原行程明細 (依 item.routes 內容生成 DOM，此處省略細節)
            document.getElementById('submitBtn').className = "w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-xl shadow-md transition";
            document.getElementById('submitBtn').innerText = "更新車單資料 (發送變更通報)";
        };

        // 表單提交處理 (CREATE 或 UPDATE 均拋給 GAS)
        document.getElementById('carForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // 搜集資料 payload ...
            // fetch(BACKEND_API_URL, { method: 'POST', body: JSON.stringify(payload) })
            // 提示成功並重設
        });
    </script>
</body>
</html>
