<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躍成科技 - 車輛使用申請單／汽車工作排程日報表</title>
    <!-- 使用 Tailwind CSS 進行現代化、響應式排版 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen py-6 px-4 font-sans text-slate-800">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        
        <!-- 表頭與標題 -->
        <div class="bg-gradient-to-r from-slate-800 to-blue-900 text-white p-6 text-center shadow-md">
            <h1 class="text-2xl md:text-3xl font-bold tracking-wider mb-2">躍成科技股份有限公司</h1>
            <p class="text-sm md:text-base text-slate-300 font-medium">車輛使用申請單 ＼ 汽車工作排程日報表</p>
        </div>

        <!-- 表單主體 -->
        <form id="carRequestForm" class="p-6 space-y-6">
            
            <!-- 第一區塊：基本資訊 -->
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="text-md font-semibold text-blue-950 mb-3 flex items-center gap-2 border-b border-slate-200 pb-1.5">
                    <i class="fa-solid fa-file-invoice"></i> 基本派車資訊
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">日期</label>
                        <input type="date" id="date" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">車號</label>
                        <select id="carNumber" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white focus:ring-2 focus:ring-blue-500">
                            <option value="BLB-1251">BLB-1251</option>
                            <option value="其他公務車">其他公務車</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">申請人 / 填表人</label>
                        <input type="text" id="applicant" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white focus:ring-2 focus:ring-blue-500" placeholder="如：黃季豐">
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">出車時間</label>
                        <input type="time" id="startTime" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">收車時間</label>
                        <input type="time" id="endTime" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-xs font-bold text-slate-600 mb-1">同行人員 (無則填「無」)</label>
                    <input type="text" id="passengers" class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white focus:ring-2 focus:ring-blue-500" value="無">
                </div>
            </div>

            <!-- 第二區塊：安全檢查與維護 -->
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="text-md font-semibold text-blue-950 mb-3 flex items-center gap-2 border-b border-slate-200 pb-1.5">
                    <i class="fa-solid fa-shield-halved"></i> 出車前車輛檢查 (請落實勾選)
                </h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3 py-2">
                    <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
                        <input type="checkbox" name="carCheck" value="機油" checked class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span>機油</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
                        <input type="checkbox" name="carCheck" value="水箱" checked class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span>水箱</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
                        <input type="checkbox" name="carCheck" value="輪胎" checked class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span>輪胎</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
                        <input type="checkbox" name="carCheck" value="燈光" checked class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span>燈光</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
                        <input type="checkbox" name="carCheck" value="刹車" checked class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span>刹車</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
                        <input type="checkbox" name="carCheck" value="車內整潔" checked class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <span>車內整潔</span>
                    </label>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">車況待修事項</label>
                        <input type="text" id="maintenanceNeed" class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white focus:ring-2 focus:ring-blue-500" value="無">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">預計行程 (總體概述)</label>
                        <input type="text" id="estimatedRoute" required class="w-full rounded-lg border border-slate-300 p-2 text-sm bg-white focus:ring-2 focus:ring-blue-500" placeholder="例如：南電樹林">
                    </div>
                </div>
            </div>

            <!-- 第三區塊：動態行程路線（對應原圖中間的表格，改為手機方便填寫的卡片型動態列表） -->
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex justify-between items-center mb-3 border-b border-slate-200 pb-1.5">
                    <h2 class="text-md font-semibold text-blue-950 flex items-center gap-2">
                        <i class="fa-solid fa-route"></i> 行駛路線與排程明細
                    </h2>
                    <button type="button" id="addRouteBtn" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-1 px-2.5 rounded-lg flex items-center gap-1 transition shadow-sm">
                        <i class="fa-solid fa-plus"></i> 新增下一段行程
                    </button>
                </div>

                <!-- 動態行程容器 -->
                <div id="routesContainer" class="space-y-4">
                    <!-- 預設第一段行程 -->
                    <div class="route-item bg-white p-3 rounded-lg border border-slate-200 shadow-xs relative grid grid-cols-1 md:grid-cols-4 gap-3 pt-6 md:pt-3">
                        <div class="absolute top-2 left-2 bg-slate-200 text-slate-700 font-bold text-2xl w-5 h-5 rounded-full flex items-center justify-center index-tag">1</div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-0.5">行駛路線</label>
                            <input type="text" name="routePath[]" required class="w-full border-b border-slate-300 focus:border-blue-500 p-1 text-sm outline-none" placeholder="如: 公司→南電樹林">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-0.5">行駛里程 (起→迄)</label>
                            <input type="text" name="routeMileage[]" required class="w-full border-b border-slate-300 focus:border-blue-500 p-1 text-sm outline-none" placeholder="如: 221121→221127">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-0.5">用途</label>
                            <select name="routePurpose[]" class="w-full border-b border-slate-300 focus:border-blue-500 p-1 text-sm outline-none bg-transparent">
                                <option value="送貨">📦 送貨</option>
                                <option value="取貨">📥 取貨</option>
                                <option value="售服">🛠️ 售服</option>
                                <option value="業訪">💼 業訪</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-0.5">備註 (品名/數量)</label>
                            <input type="text" name="routeNotes[]" class="w-full border-b border-slate-300 focus:border-blue-500 p-1 text-sm outline-none" placeholder="如: YC-3200 *50包 750kg">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部注意事項提示 -->
            <div class="bg-amber-50 border-l-4 border-amber-500 p-3 rounded-r-xl text-xs text-amber-900 space-y-1">
                <p class="font-bold">⚠️ 注意事項：</p>
                <p>1. 車輛使用後請保持清潔並落實填寫表單，每日 16:30 前將表單 PO 至 TP 群組，於下班前提交美娟歸檔。</p>
                <p>2. 每至一家客戶需附服務報告，若為其他因素致客戶端請於備註處說明原因。</p>
            </div>

            <!-- 送出按鈕 -->
            <div class="pt-2">
                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition duration-150 transform active:scale-98 flex items-center justify-center gap-2 text-base">
                    <i class="fa-solid fa-paper-plane"></i> 提交車輛日報單 (觸發 LINE & Mail)
                </button>
            </div>
        </form>

        <!-- 狀態回饋顯示 -->
        <div id="statusBox" class="hidden m-6 p-4 rounded-xl text-center font-bold text-sm"></div>
    </div>

    <!-- JavaScript 互動與資料擴充介面 -->
    <script>
        // 1. 自動設定今日日期（台灣時區 YYYY-MM-DD）
        const today = new Date();
        today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
        document.getElementById('date').value = today.toISOString().split('T')[0];

        // 2. 後端串接擴充點：未來將您的 Google Apps Script 部署網址填入此處
        const BACKEND_API_URL = "https://script.google.com/macros/s/您的GAS部署ID/exec";

        // 3. 動態「新增行程」邏輯
        const container = document.getElementById('routesContainer');
        document.getElementById('addRouteBtn').addEventListener('click', () => {
            const routeCount = container.querySelectorAll('.route-item').length + 1;
            const newRoute = document.createElement('div');
            newRoute.className = "route-item bg-white p-3 rounded-lg border border-slate-200 shadow-xs relative grid grid-cols-1 md:grid-cols-4 gap-3 pt-6 md:pt-3";
            newRoute.innerHTML = `
                <div class="absolute top-2 left-2 bg-slate-200 text-slate-700 font-bold text-2xl w-5 h-5 rounded-full flex items-center justify-center index-tag">${routeCount}</div>
                <button type="button" class="absolute top-1 right-2 text-slate-400 hover:text-red-500 remove-btn text-sm"><i class="fa-solid fa-trash-can"></i></button>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-0.5">行駛路線</label>
                    <input type="text" name="routePath[]" required class="w-full border-b border-slate-300 focus:border-blue-500 p-1 text-sm outline-none">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-0.5">行駛里程 (起→迄)</label>
                    <input type="text" name="routeMileage[]" required class="w-full border-b border-slate-300 focus:border-blue-500 p-1 text-sm outline-none">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-0.5">用途</label>
                    <select name="routePurpose[]" class="w-full border-b border-slate-300 focus:border-blue-500 p-1 text-sm outline-none bg-transparent">
                        <option value="送貨">📦 送貨</option>
                        <option value="取貨">📥 取貨</option>
                        <option value="售服">🛠️ 售服</option>
                        <option value="業訪">💼 業訪</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-0.5">備註 (品名/數量)</label>
                    <input type="text" name="routeNotes[]" class="w-full border-b border-slate-300 focus:border-blue-500 p-1 text-sm outline-none">
                </div>
            `;
            container.appendChild(newRoute);
            
            // 綁定刪除功能
            newRoute.querySelector('.remove-btn').addEventListener('click', () => {
                newRoute.remove();
                reindexRoutes();
            });
        });

        // 重新編號行程
        function reindexRoutes() {
            const items = container.querySelectorAll('.route-item');
            items.forEach((item, index) => {
                item.querySelector('.index-tag').innerText = index + 1;
            });
        }

        // 4. 表單提交事件處理
        document.getElementById('carRequestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 資料傳送中...`;

            // 搜集勾選的檢查項目
            const checks = [];
            document.querySelectorAll('input[name="carCheck"]:checked').forEach(cb => checks.push(cb.value));

            // 搜集動態行程陣列
            const paths = Array.from(document.querySelectorAll('input[name="routePath[]"]')).map(el => el.value);
            const mileages = Array.from(document.querySelectorAll('input[name="routeMileage[]"]')).map(el => el.value);
            const purposes = Array.from(document.querySelectorAll('select[name="routePurpose[]"]')).map(el => el.value);
            const notes = Array.from(document.querySelectorAll('input[name="routeNotes[]"]')).map(el => el.value);
            
            const detailedRoutes = paths.map((path, i) => ({
                path: path,
                mileage: mileages[i] || "",
                purpose: purposes[i] || "",
                notes: notes[i] || ""
            }));

            // 整合封裝成標準化 JSON 資料包
            const finalPayload = {
                company: "躍成科技股份有限公司",
                date: document.getElementById('date').value,
                carNumber: document.getElementById('carNumber').value,
                applicant: document.getElementById('applicant').value,
                timeWindow: `${document.getElementById('startTime').value} ~ ${document.getElementById('endTime').value}`,
                passengers: document.getElementById('passengers').value,
                carChecks: checks.join(', '),
                maintenanceNeed: document.getElementById('maintenanceNeed').value,
                estimatedRoute: document.getElementById('estimatedRoute').value,
                routes: detailedRoutes
            };

            try {
                // 發送至後端 Google Apps Script
                await fetch(BACKEND_API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 配合 Google Apps Script 跨域限制
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(finalPayload)
                });

                // 成功回饋
                statusBox.className = "m-6 p-4 rounded-xl text-center font-bold text-sm bg-emerald-50 text-emerald-800 border border-emerald-200";
                statusBox.innerHTML = `🎉 提交成功！已自動寫入試算表並發送 LINE 與 Mail 通知。`;
                statusBox.classList.remove('hidden');
                document.getElementById('carRequestForm').reset();
                // 重設今日日期
                document.getElementById('date').value = new Date().toISOString().split('T')[0];
            } catch (err) {
                statusBox.className = "m-6 p-4 rounded-xl text-center font-bold text-sm bg-rose-50 text-rose-800 border border-rose-200";
                statusBox.innerHTML = `❌ 發送失敗，請確認網路連線或 API 設定。`;
                statusBox.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> 提交車輛日報單 (觸發 LINE & Mail)`;
            }
        });
    </script>
</body>
</html>
